status = error
name = SparkLogConfig

appender.file.type = File
appender.file.name = SparkFile
appender.file.fileName = logs/spark.log
appender.file.append = true
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n

rootLogger.level = INFO
rootLogger.appenderRef.sparkFile.ref = SparkFile

logger.spark.name = org.apache.spark
logger.spark.level = INFO

logger.iceberg.name = org.apache.iceberg
logger.iceberg.level = INFO
